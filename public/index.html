<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeClick AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF6A00;--orange-light:#FFF3EB;--orange-mid:#FFE0CC;
  --bg:#FAFAFA;--surface:#FFFFFF;--border:#E5E5E5;
  --text:#0F0F0F;--muted:#6B7280;--subtle:#9CA3AF;
  --green:#10B981;--green-bg:#ECFDF5;
  --red:#EF4444;--red-bg:#FEF2F2;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.logo-sub{font-size:10px;color:var(--muted)}
.sidebar-nav{padding:12px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--subtle);letter-spacing:.8px;text-transform:uppercase;padding:8px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;color:var(--muted);font-size:13.5px;font-weight:400;transition:all .12s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:#F5F5F5;color:var(--text)}
.nav-item.active{background:var(--orange-light);color:var(--orange);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar-sm{width:28px;height:28px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;flex-shrink:0}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-0.2px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.page-content{flex:1;overflow-y:auto;padding:24px 28px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:box-shadow .15s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-card.accent{border-left:3px solid var(--orange)}
.stat-card.green-accent{border-left:3px solid var(--green)}
.stat-card.blue-accent{border-left:3px solid var(--blue)}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:21px;font-weight:600;letter-spacing:-0.5px}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .12s;white-space:nowrap;font-family:inherit}
.btn:hover{background:#F5F5F5}
.btn-primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-primary:hover{background:#e55f00}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:#fecaca}
.btn-ghost{border:none;background:transparent;color:var(--muted);padding:4px 8px}
.btn-ghost:hover{background:#F5F5F5;color:var(--text)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.table-title{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 18px;text-align:left;border-bottom:1px solid var(--border);background:#FAFAFA;white-space:nowrap}
tbody td{padding:11px 18px;border-bottom:1px solid #F5F5F5;font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FAFAFA}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-green{background:var(--green-bg);color:#059669}
.badge-red{background:var(--red-bg);color:#DC2626}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-orange{background:var(--orange-light);color:var(--orange)}
.badge-gray{background:#F3F4F6;color:var(--muted)}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.chart-title{font-size:14px;font-weight:600}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:160px}
.bar-group{display:flex;flex-direction:column;align-items:center;flex:1;gap:0}
.bar-pair{display:flex;gap:2px;align-items:flex-end;flex:1;width:100%}
.bar{border-radius:3px 3px 0 0;flex:1;transition:opacity .2s;cursor:default}
.bar:hover{opacity:.75}
.bar-lbl{font-size:9px;color:var(--subtle);margin-top:5px}
.chart-legend{display:flex;gap:16px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:2px}
.toggle-group{display:flex;background:#F3F4F6;border-radius:6px;padding:2px}
.toggle-btn{padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .12s;font-weight:500}
.toggle-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.client-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.name-cell{display:flex;align-items:center;gap:10px}
.activity-list{list-style:none}
.activity-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #F5F5F5}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);margin-top:5px;flex-shrink:0}
.activity-text{font-size:13px}
.activity-time{font-size:11px;color:var(--subtle);margin-top:1px}
.insight-card{background:linear-gradient(135deg,#FFFBF7,#FFF3EB);border:1px solid var(--orange-mid);border-radius:10px;padding:16px}
.insight-title{font-size:11px;font-weight:700;color:var(--orange);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.insight-text{font-size:12.5px;color:var(--text);line-height:1.55}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:460px;max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.18);animation:slideUp .18s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-size:13.5px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;transition:border-color .12s}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,106,0,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 20px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab:hover:not(.active){color:var(--text)}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:18px;transition:color .12s}
.back-btn:hover{color:var(--text)}
.client-hero{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;margin-bottom:18px;display:flex;align-items:center;gap:18px}
.client-hero-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;background-size:cover;background-position:center;background-repeat:no-repeat;position:relative;cursor:pointer;transition:transform .15s, box-shadow .15s;flex-shrink:0}
.client-hero-av:hover{transform:scale(1.04);box-shadow:0 4px 12px rgba(255,106,0,.25)}
.client-hero-av .av-cam{position:absolute;right:-2px;bottom:-2px;width:22px;height:22px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15);pointer-events:none}
.client-hero-av.has-photo{color:transparent;font-size:0}
.client-avatar{background-size:cover;background-position:center;background-repeat:no-repeat}
.client-avatar.has-photo{color:transparent;font-size:0}
.file-item{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid #F5F5F5;transition:background .1s}
.file-item:hover{background:#FAFAFA}
.file-item:last-child{border-bottom:none}
.file-icon{width:32px;height:32px;border-radius:6px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{font-size:11px;color:var(--subtle);margin-top:2px}
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px}
.upload-zone:hover{border-color:var(--orange);background:var(--orange-light)}
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-bar-bg{flex:1;height:4px;background:#F3F4F6;border-radius:4px}
.progress-bar{height:100%;border-radius:4px}
.empty-state{padding:48px 20px;text-align:center;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-text{font-size:13.5px}
.toast{position:fixed;bottom:24px;right:24px;background:#0F0F0F;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;animation:slideUp .2s ease;display:flex;align-items:center;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page{animation:fadeIn .18s ease}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#E5E5E5;border-radius:4px}
.search-input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;color:var(--text);outline:none;font-family:inherit;width:200px;transition:border-color .12s}
.search-input:focus{border-color:var(--orange)}
.loading{padding:48px;text-align:center;color:var(--muted);font-size:13px}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.section-title{font-size:14px;font-weight:600}
.chart-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.select-input{padding:6px 28px 6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;color:var(--text);background:var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' stroke='%236B7280' stroke-width='1.5' fill='none'/></svg>") no-repeat right 8px center;outline:none;font-family:inherit;cursor:pointer;appearance:none}
.select-input:focus{border-color:var(--orange)}
.area-chart{position:relative;width:100%;height:240px}
.area-chart svg{width:100%;height:100%;overflow:visible;display:block}
.chart-tooltip{position:absolute;background:#0F0F0F;color:#fff;padding:8px 10px;border-radius:6px;font-size:12px;pointer-events:none;opacity:0;transform:translate(-50%,-110%);transition:opacity .12s;white-space:nowrap;z-index:10}
.chart-tooltip.show{opacity:1}
.chart-tooltip .tt-label{color:#9CA3AF;font-size:10px;margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.chart-tooltip .tt-row{display:flex;align-items:center;gap:6px;font-weight:500}
.chart-tooltip .tt-dot{width:7px;height:7px;border-radius:50%}
.chart-dot{cursor:pointer;transition:r .15s}
.chart-dot:hover{r:6}
@keyframes drawLine{from{stroke-dashoffset:1500}to{stroke-dashoffset:0}}
.chart-line{stroke-dasharray:1500;stroke-dashoffset:1500;animation:drawLine .9s ease-out forwards}
@keyframes fadeArea{from{opacity:0}to{opacity:1}}
.chart-area-fill{animation:fadeArea .8s ease-out forwards .2s;opacity:0}
@keyframes popDot{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.chart-dot{transform-origin:center;transform-box:fill-box;animation:popDot .35s ease-out forwards;opacity:0}
.calendar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:15px;font-weight:600}
.cal-nav{display:flex;gap:6px;align-items:center}
.cal-nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .12s}
.cal-nav-btn:hover{background:#F5F5F5;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{font-size:10px;font-weight:600;color:var(--subtle);text-transform:uppercase;letter-spacing:.5px;text-align:center;padding:6px 0}
.cal-day{aspect-ratio:1;border:1px solid var(--border);border-radius:6px;padding:6px;cursor:pointer;display:flex;flex-direction:column;transition:all .12s;background:var(--surface);min-height:64px}
.cal-day:hover{border-color:var(--orange);background:var(--orange-light)}
.cal-day.empty{border:none;cursor:default;background:transparent}
.cal-day.empty:hover{background:transparent}
.cal-day.today{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text)}
.cal-day.today .cal-day-num{color:var(--orange);font-weight:700}
.cal-day-tasks{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto}
.cal-task-dot{width:7px;height:7px;border-radius:50%}
.quote-table{width:100%;border-collapse:collapse;margin-bottom:14px}
.quote-table th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:8px;text-align:left;border-bottom:1px solid var(--border);background:#FAFAFA}
.quote-table td{padding:8px;border-bottom:1px solid #F5F5F5;font-size:13px;vertical-align:middle}
.quote-table input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;outline:none}
.quote-table input:focus{border-color:var(--orange)}
.quote-totals{display:flex;flex-direction:column;gap:6px;padding:14px 16px;background:#FAFAFA;border-radius:8px;margin-top:8px}
.quote-totals-row{display:flex;justify-content:space-between;font-size:13px}
.quote-totals-row.grand{font-size:16px;font-weight:700;color:var(--orange);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.quote-preview{background:#fff;border:1px solid var(--border);border-radius:10px;padding:32px;font-family:'DM Sans',sans-serif}
.quote-preview-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:18px;border-bottom:2px solid var(--orange)}
.quote-preview-brand{display:flex;align-items:center;gap:10px}
.quote-preview-brand .logo-mark{width:40px;height:40px;font-size:14px}
.quote-preview-meta{text-align:right;font-size:12px;color:var(--muted)}
.quote-preview-meta strong{color:var(--text);font-size:13px;display:block;margin-bottom:2px}
.quote-preview-to{margin-bottom:18px;font-size:13px}
.quote-preview-to strong{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.quote-preview table{width:100%;border-collapse:collapse;margin-bottom:18px}
.quote-preview thead th{background:#FAFAFA;text-align:left;padding:10px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:2px solid var(--border)}
.quote-preview tbody td{padding:10px;border-bottom:1px solid #F0F0F0;font-size:13px}
.quote-preview-totals{margin-left:auto;width:280px}
.quote-preview-totals .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.quote-preview-totals .row.grand{border-top:2px solid var(--orange);padding-top:10px;margin-top:6px;font-size:15px;font-weight:700;color:var(--orange)}
.quote-preview-foot{margin-top:24px;padding-top:14px;border-top:1px dashed var(--border);font-size:11.5px;color:var(--muted);line-height:1.6}
.modal-lg{width:680px;max-width:96vw}
.modal-xl{width:820px;max-width:96vw;max-height:90vh;overflow-y:auto}
@media print{
  body *{visibility:hidden!important}
  #print-area, #print-area *{visibility:visible!important}
  #print-area{position:absolute;left:0;top:0;width:100%;padding:20px;background:#fff}
  .no-print{display:none!important}
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">WC</div>
    <div>
      <div class="logo-text">WeClick AI</div>
      <div class="logo-sub">Marketing Agency</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <div class="nav-section">Main</div>
    <div class="nav-item" data-page="dashboard">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Dashboard
    </div>
    <div class="nav-item" data-page="clients">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6"/></svg>
      Clients
    </div>
    <div class="nav-item" data-page="campaigns">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8l4-5 4 3 4-4"/><path d="M2 14h12"/></svg>
      Campaigns
    </div>
    <div class="nav-section">Tools</div>
    <div class="nav-item" data-page="automations">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
      Automations
    </div>
    <div class="nav-item" data-page="collaborations">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="5" r="2.5"/><circle cx="11" cy="5" r="2.5"/><path d="M1 14c0-2.21 1.79-4 4-4s4 1.79 4 4"/><path d="M9 12.2A4 4 0 0115 14"/></svg>
      Collaborations
    </div>
    <div class="nav-section">Finance</div>
    <div class="nav-item" data-page="revenue">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v12M11 5H6.5a2.5 2.5 0 000 5h3a2.5 2.5 0 010 5H5"/></svg>

function fmt(n){
  n = Math.round(n||0);
  if(n<0) return '-' + fmt(-n);
  const s = n.toString();
  if(s.length<=3) return '₹'+s;
  const last3 = s.slice(-3);
  const rest = s.slice(0,-3);
  const grps = [];
  let tmp = rest;
  while(tmp.length>2){grps.unshift(tmp.slice(-2));tmp=tmp.slice(0,-2);}
  if(tmp) grps.unshift(tmp);
  return '₹'+grps.join(',')+','+last3;
}
function ini(name){return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function avatarHtml(c, opts){
  opts = opts || {};
  const cls = opts.cls || 'client-avatar';

  const inline = size ? `width:${size}px;height:${size}px;font-size:${Math.max(9,Math.round(size*0.36))}px;` : '';
  const initials = ini(c.name);
  if(c.avatar_url){
    return `<div class="${cls}" style="background:${c.color};${inline}position:relative;overflow:hidden">

  }
  return `<div class="${cls}" style="background:${c.color};${inline}">${initials}</div>`;
}
function relTime(d){const days=Math.floor((Date.now()-new Date(d).getTime())/86400000);return days===0?'Today':days===1?'Yesterday':days+'d ago';}
function toast(msg,type='success'){

}

// Generate a deterministic seeded series for a client so the chart is stable
function seriesFor(clientId, period, baseRev, baseSpend){
  const n = period==='30' ? 30 : 12;
  let seed = (parseInt(clientId,10) || 7) * 13 + (period==='30'?1:2);
  const rand = () => { seed = (seed*9301 + 49297) % 233280; return seed/233280; };
  const rev=[], sp=[];
  for(let i=0;i<n;i++){
    const t = i/(n-1);
    const wave = 0.65 + 0.45*Math.sin(t*Math.PI*1.6) + (rand()-0.5)*0.25;
    const trend = 0.8 + t*0.45;
    rev.push(Math.max(0, Math.round(baseRev * wave * trend)));
    sp.push(Math.max(0, Math.round(baseSpend * (0.7 + (rand()-0.4)*0.5) * (0.85 + t*0.3))));
  }
  return { rev, sp };
}
function chartLabels(period){
  if(period==='30'){
    const out=[]; const today=new Date();
    for(let i=29;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); out.push(d.getDate()); }
    return out;
  }
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const out=[]; const today=new Date();
  for(let i=11;i>=0;i--){ const d=new Date(today.getFullYear(),today.getMonth()-i,1); out.push(months[d.getMonth()]); }
  return out;
}
function smoothPath(points){
  if(points.length<2) return '';
  let d=`M ${points[0].x} ${points[0].y}`;
  for(let i=0;i<points.length-1;i++){
    const p0=points[i-1]||points[i], p1=points[i], p2=points[i+1], p3=points[i+2]||p2;
    const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
    d+=` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}
function drawChart(){
  const area=document.getElementById('chart-area');
  if(!area) return;
  const period=appState.chartPeriod;
  const labels=chartLabels(period);

  let rev, sp;
  if(appState.chartClientId==='all'){
    const totalRev = appState.clients.reduce((s,c)=>s+(c.revenue||0),0);
    const totalSp  = appState.clients.reduce((s,c)=>s+(c.spend||0),0);
    const baseRev = (totalRev/labels.length) || 250000;
    const baseSp  = (totalSp/labels.length) || 80000;
    ({rev, sp} = seriesFor('all', period, baseRev, baseSp));
  } else {
    const c = appState.clients.find(x=>String(x.id)===String(appState.chartClientId));
    const baseRev = ((c?.revenue)||100000)/labels.length;
    const baseSp  = ((c?.spend)||30000)/labels.length;
    ({rev, sp} = seriesFor(c?.id||1, period, baseRev, baseSp));
  }

  const W=area.clientWidth||820, H=240;
  const padL=44, padR=16, padT=14, padB=28;
  const innerW=W-padL-padR, innerH=H-padT-padB;
  const max=Math.max(...rev, ...sp, 1);
  const niceMax=Math.ceil(max/100000)*100000 || max;
  const x=i=>padL + (labels.length===1?innerW/2:i*innerW/(labels.length-1));
  const y=v=>padT + innerH - (v/niceMax)*innerH;

  const revPts=rev.map((v,i)=>({x:x(i),y:y(v),v}));
  const spPts =sp.map((v,i)=>({x:x(i),y:y(v),v}));
  const revPath=smoothPath(revPts);
  const spPath =smoothPath(spPts);
  const revArea=`${revPath} L ${revPts[revPts.length-1].x} ${padT+innerH} L ${revPts[0].x} ${padT+innerH} Z`;
  const spArea =`${spPath} L ${spPts[spPts.length-1].x} ${padT+innerH} L ${spPts[0].x} ${padT+innerH} Z`;

  // Gridlines (4 horizontal)
  const gridLines=[]; const gridLabels=[];
  for(let i=0;i<=4;i++){
    const yy=padT + innerH*i/4;
    const val=Math.round(niceMax*(1-i/4));
    gridLines.push(`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#F0F0F0" stroke-width="1"/>`);
    gridLabels.push(`<text x="${padL-8}" y="${yy+4}" text-anchor="end" font-size="10" fill="#9CA3AF" font-family="DM Sans">${val>=1000?Math.round(val/1000)+'k':val}</text>`);
  }

  // X labels (sample ~7 ticks)
  const step=Math.max(1, Math.ceil(labels.length/7));
  const xLabels=labels.map((l,i)=> (i%step===0||i===labels.length-1) ? `<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="#9CA3AF" font-family="DM Sans">${l}</text>` : '').join('');

  area.innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="revGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#FF6A00" stop-opacity="0.32"/>
          <stop offset="100%" stop-color="#FF6A00" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="spGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#9CA3AF" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#9CA3AF" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines.join('')}
      ${gridLabels.join('')}
      ${xLabels}
      <path class="chart-area-fill" d="${spArea}" fill="url(#spGrad)"/>
      <path class="chart-line" d="${spPath}" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation-delay:.05s"/>
      <path class="chart-area-fill" d="${revArea}" fill="url(#revGrad)" style="animation-delay:.1s"/>
      <path class="chart-line" d="${revPath}" fill="none" stroke="#FF6A00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${spPts.map((p,i)=>`<circle class="chart-dot" cx="${p.x}" cy="${p.y}" r="3.5" fill="#fff" stroke="#9CA3AF" stroke-width="2" data-i="${i}" data-kind="sp" style="animation-delay:${0.5+i*0.02}s"/>`).join('')}
      ${revPts.map((p,i)=>`<circle class="chart-dot" cx="${p.x}" cy="${p.y}" r="4" fill="#fff" stroke="#FF6A00" stroke-width="2.5" data-i="${i}" data-kind="rev" style="animation-delay:${0.6+i*0.02}s"/>`).join('')}
    </svg>`;

  const tt=document.getElementById('chart-tooltip');
  area.querySelectorAll('.chart-dot').forEach(dot=>{
    dot.addEventListener('mouseenter',(e)=>{
      const i=parseInt(dot.dataset.i,10);
      const cx=parseFloat(dot.getAttribute('cx'));
      const cy=parseFloat(dot.getAttribute('cy'));
      const rect=area.getBoundingClientRect();
      const scaleX=rect.width/W, scaleY=rect.height/H;
      tt.style.left=(cx*scaleX)+'px';
      tt.style.top=(cy*scaleY)+'px';
      tt.innerHTML=`<div class="tt-label">${labels[i]}</div>
        <div class="tt-row"><span class="tt-dot" style="background:#FF6A00"></span>Revenue ${fmt(rev[i])}</div>
        <div class="tt-row"><span class="tt-dot" style="background:#9CA3AF"></span>Ad Spend ${fmt(sp[i])}</div>`;
      tt.classList.add('show');
    });
    dot.addEventListener('mouseleave',()=>tt.classList.remove('show'));
  });
}
function toggleChart(p){appState.chartPeriod=p;document.querySelectorAll('.toggle-btn').forEach(b=>{b.classList.toggle('active',b.textContent.trim().startsWith(p==='30'?'30':'90'))});drawChart();}

// ── CONTENT CALENDAR ──────────────────────────────────────────
function platformColor(p){
  return {Instagram:'#E1306C',Meta:'#1877F2',LinkedIn:'#0A66C2',YouTube:'#FF0000'}[p]||'#888';
}
function renderCalendar(client){
  if(!appState.calendarMonth){
    const d=new Date();
    appState.calendarMonth={year:d.getFullYear(),month:d.getMonth()};
  }
  const {year,month}=appState.calendarMonth;
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const first=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0).getDate();
  const startWeekday=first.getDay();
  const today=new Date();
  const isToday=(d)=> today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;

  const tasks=client.contentTasks||[];
  const tasksByDay={};
  tasks.forEach(t=>{
    const td=new Date(t.date);
    if(td.getFullYear()===year && td.getMonth()===month){
      const k=td.getDate();
      if(!tasksByDay[k]) tasksByDay[k]=[];
      tasksByDay[k].push(t);
    }
  });

  let cells='';
  for(let i=0;i<startWeekday;i++) cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=lastDay;d++){
    const dayTasks=tasksByDay[d]||[];
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dots=dayTasks.slice(0,6).map(t=>`<span class="cal-task-dot" style="background:${platformColor(t.platform)}" title="${t.platform} · ${t.content_type}"></span>`).join('');
    cells+=`<div class="cal-day ${isToday(d)?'today':''}" onclick="openAddContentTask(${client.id},'${dateStr}')">
      <div class="cal-day-num">${d}</div>
      <div class="cal-day-tasks">${dots}</div>
    </div>`;
  }
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(n=>`<div class="cal-day-name">${n}</div>`).join('');

  const taskList=tasks.length===0?'':`
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px">Scheduled this month</div>
      ${tasks.filter(t=>{const td=new Date(t.date);return td.getFullYear()===year && td.getMonth()===month;}).map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;border-bottom:1px solid #F5F5F5">
          <span class="cal-task-dot" style="background:${platformColor(t.platform)};width:9px;height:9px"></span>
          <span style="font-weight:500;min-width:90px">${new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>
          <span style="color:var(--muted)">${t.platform} · ${t.content_type}</span>
          ${t.notes?`<span style="color:var(--subtle);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">— ${t.notes}</span>`:'<span style="flex:1"></span>'}
          <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="deleteContentTask(${client.id},${t.id})">×</button>
        </div>`).join('')}
    </div>`;

  return `
    <div class="cal-head">
      <div class="cal-title">Content Calendar — ${monthNames[month]} ${year}</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)" title="Previous">‹</button>
        <button class="cal-nav-btn" onclick="changeMonth(0)" title="Today">●</button>
        <button class="cal-nav-btn" onclick="changeMonth(1)" title="Next">›</button>
      </div>
    </div>
    <div class="cal-grid">${dayNames}${cells}</div>
    ${taskList}`;
}
async function changeMonth(delta){
  if(delta===0){ const d=new Date(); appState.calendarMonth={year:d.getFullYear(),month:d.getMonth()}; }
  else {
    const m=appState.calendarMonth.month+delta;
    appState.calendarMonth={
      year: appState.calendarMonth.year + Math.floor(m/12),
      month: ((m%12)+12)%12
    };
  }
  navigate('clientDetail',appState.selectedClientId);
}
function openAddContentTask(clientId,dateStr){
  openModal(`<div class="modal-title">Add Content Task — ${new Date(dateStr).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Platform</label>
        <select class="form-input" id="m-plat"><option>Instagram</option><option>Meta</option><option>LinkedIn</option><option>YouTube</option></select>
      </div>
      <div class="form-group"><label class="form-label">Content Type</label>

function addQuoteItem(){
  appState.quoteItems.push({service:'',description:'',qty:1,rate:0});
  renderQuoteItems();
}
function removeQuoteItem(i){
  appState.quoteItems.splice(i,1);
  if(appState.quoteItems.length===0) appState.quoteItems.push({service:'',description:'',qty:1,rate:0});
  renderQuoteItems();
}
function updateQuoteItem(i,field,val){
  appState.quoteItems[i][field]=val;
  renderQuoteTotals();
}
function renderQuoteItems(){
  const wrap=document.getElementById('quote-items-wrap');
  if(!wrap) return;
  wrap.innerHTML=`<table class="quote-table">
    <thead><tr><th style="width:24%">Service</th><th>Description</th><th style="width:70px">Qty</th><th style="width:110px">Rate (₹)</th><th style="width:110px">Amount</th><th style="width:36px"></th></tr></thead>
    <tbody>${appState.quoteItems.map((it,i)=>`<tr>
      <td><input value="${it.service||''}" placeholder="Service name" oninput="updateQuoteItem(${i},'service',this.value)"></td>
      <td><input value="${it.description||''}" placeholder="Brief description" oninput="updateQuoteItem(${i},'description',this.value)"></td>
      <td><input type="number" value="${it.qty}" min="0" step="1" oninput="updateQuoteItem(${i},'qty',parseFloat(this.value)||0)"></td>
      <td><input type="number" value="${it.rate}" min="0" oninput="updateQuoteItem(${i},'rate',parseFloat(this.value)||0)"></td>
      <td style="font-weight:500">${fmt((it.qty||0)*(it.rate||0))}</td>
      <td><button class="btn btn-ghost btn-sm" style="color:var(--red);padding:4px 8px" onclick="removeQuoteItem(${i})">×</button></td>
    </tr>`).join('')}</tbody>
  </table>`;
  renderQuoteTotals();
}
function renderQuoteTotals(){
  const wrap=document.getElementById('quote-totals-wrap');
  if(!wrap) return;
  const subtotal=appState.quoteItems.reduce((s,i)=>s+(i.qty||0)*(i.rate||0),0);
  const gstPct=parseFloat(document.getElementById('m-gst')?.value)||0;
  const gstAmt=subtotal*gstPct/100;
  const total=subtotal+gstAmt;
  wrap.innerHTML=`<div class="quote-totals">
    <div class="quote-totals-row"><span style="color:var(--muted)">Subtotal</span><span>${fmt(subtotal)}</span></div>
    <div class="quote-totals-row"><span style="color:var(--muted)">GST (${gstPct}%)</span><span>${fmt(gstAmt)}</span></div>
    <div class="quote-totals-row grand"><span>Grand Total</span><span>${fmt(total)}</span></div>
  </div>`;
}

function openSendReport(clientId){
  api(`/api/clients/${clientId}`).then(c=>{

    const body=`Hi ${c.name.split(' ')[0]},\n\nPlease find attached your latest performance report.\n\nKey highlights this period:\n• Revenue: ${fmt(c.revenue)}\n• Ad Spend: ${fmt(c.spend)}\n• Profit: ${fmt(c.profit)}\n\nLet us know if you'd like to discuss the next steps.\n\nBest,\nWeClick AI Team`;
    const quotations = Array.isArray(c.quotations) ? c.quotations : [];
    const quotationOptions = quotations.length
      ? `<option value="">None</option>` + quotations.map(q=>`<option value="${q.id}">${q.quotation_no} — ₹${Number(q.total).toLocaleString('en-IN')}</option>`).join('')
      : `<option value="">No quotations yet</option>`;
    openModal(`<div class="modal-title">Send Report — ${c.name}</div>
      <div class="form-group"><label class="form-label">To</label><input class="form-input" id="m-to" type="email" placeholder="client@company.com"></div>
      <div class="form-group"><label class="form-label">Subject</label><input class="form-input" id="m-subj" value="${subject}"></div>
      <div class="form-group"><label class="form-label">Message</label><textarea class="form-input" id="m-body" rows="8" style="resize:vertical">${body}</textarea></div>
      <div class="form-group"><label class="form-label">Attach Quotation (PDF)</label><select class="form-input" id="m-quotation">${quotationOptions}</select></div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="sendReport(${clientId})">📧 Send Report</button></div>`);
  });
}
async function sendReport(clientId){
  const to=document.getElementById('m-to').value.trim();
  if(!to){ toast('Recipient email required','error'); return; }
  const quotation_id=document.getElementById('m-quotation')?.value||null;
  const btn=document.querySelector('#modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try{
    const result=await api(`/api/clients/${clientId}/send-report`,{method:'POST',body:JSON.stringify({
      to, subject: document.getElementById('m-subj').value, body: document.getElementById('m-body').value,
      quotation_id: quotation_id||undefined
    })});
    if(result&&result.success){ toast('Report sent successfully'+(quotation_id?' with quotation PDF':'')); closeModal(); }
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='📧 Send Report';}
  }
}

  openModal(`<div class="modal-title">Add Salary Payment</div>
  <div class="form-group"><label class="form-label">Team Member</label><select class="form-input" id="m-uid">${users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div>
  <div class="form-row"><div class="form-group"><label class="form-label">Amount (₹)</label><input class="form-input" id="m-amt" type="number" placeholder="0"></div><div class="form-group"><label class="form-label">Date</label><input class="form-input" id="m-dt" type="date" value="${new Date().toISOString().split('T')[0]}"></div></div>
  <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="m-notes" placeholder="May salary…"></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveSalary()">Add</button></div>`);
}
async function saveSalary(){
  const amount=parseFloat(document.getElementById('m-amt').value);
  if(!amount||isNaN(amount)){toast('Enter valid amount','error');return;}
  await api('/api/salaries',{method:'POST',body:JSON.stringify({user_id:parseInt(document.getElementById('m-uid').value),amount,date:document.getElementById('m-dt').value,notes:document.getElementById('m-notes').value})});
  toast('Salary added');closeModal();navigate('revenue');
}

// ── FILE UPLOAD ─────────────────────────────────────────────────
let pendingFile=null;
function openUploadFile(clientId){
  pendingFile=null;
  openModal(`<div class="modal-title">Upload File</div>
  <div class="upload-zone" onclick="document.getElementById('fu').click()">
    <div style="font-size:28px;margin-bottom:8px">📎</div>
    <div style="font-weight:500;margin-bottom:4px">Click to browse</div>
    <div style="font-size:12px;color:var(--muted)">PDF, images, docs · Max 20MB</div>
    <input type="file" id="fu" style="display:none" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.xlsx,.csv" onchange="onFileSelect(this,${clientId})">
  </div>
  <div class="form-group"><label class="form-label">File Type</label><select class="form-input" id="m-ftype"><option value="report">Report</option><option value="calendar">Calendar</option><option value="quotation">Quotation</option><option value="creative">Creative</option></select></div>
  <div id="file-preview" style="display:none;background:#F9F9F9;border-radius:6px;padding:10px;font-size:13px;margin-bottom:4px"></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="upload-btn" onclick="confirmUpload(${clientId})" disabled>Upload</button></div>`);
}
function onFileSelect(input,clientId){
  const file=input.files[0];
  if(!file) return;
  if(file.size>20*1024*1024){toast('File too large. Max 20MB','error');return;}
  pendingFile=file;
  const p=document.getElementById('file-preview');
  p.style.display='block';
  p.innerHTML=`📎 <strong>${file.name}</strong> &nbsp;·&nbsp; ${(file.size/1024/1024).toFixed(1)} MB`;
  document.getElementById('upload-btn').disabled=false;
}
async function confirmUpload(clientId){
  if(!pendingFile){toast('Select a file first','error');return;}
  const fd=new FormData();
  fd.append('file',pendingFile);
  fd.append('file_type',document.getElementById('m-ftype').value);
  try{
    const res=await fetch(`/api/clients/${clientId}/files`,{method:'POST',body:fd});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Upload failed');
    toast('File uploaded');pendingFile=null;closeModal();navigate('clientDetail',clientId);
  }catch(e){toast(e.message,'error');}
}
async function deleteFile(clientId,fileId){
  if(!confirm('Delete this file?')) return;
  await api(`/api/clients/${clientId}/files/${fileId}`,{method:'DELETE'});
  toast('File deleted');navigate('clientDetail',clientId);
}
async function uploadAvatar(clientId,input){
  const file=input.files&&input.files[0];if(!file)return;
  const allowed=['image/jpeg','image/png','image/webp'];
  if(!allowed.includes(file.type)){toast('Only JPG, PNG or WEBP allowed','error');input.value='';return;}
  if(file.size>2*1024*1024){toast('File too large (max 2MB)','error');input.value='';return;}
  const fd=new FormData();fd.append('avatar',file);
  try{
    const res=await fetch(`/api/clients/${clientId}/avatar`,{method:'POST',body:fd});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Upload failed');
    toast('Photo updated');
    navigate('clientDetail',clientId);
  }catch(e){toast(e.message,'error');}
  input.value='';
}

// ── META SYNC ───────────────────────────────────────────────────
async function syncMeta(){
  if(appState.syncing) return;
  appState.syncing=true;
  const icon=document.getElementById('sync-icon');
  if(icon) icon.classList.add('spinning');
  try{
    const data=await api('/api/meta/sync',{method:'POST',body:JSON.stringify({})});
    toast(`Meta synced — ${data.synced} campaigns updated`);
  }finally{
    appState.syncing=false;
    const i2=document.getElementById('sync-icon');
    if(i2) i2.classList.remove('spinning');
  }
}

// ── BOOT ────────────────────────────────────────────────────────
navigate('dashboard');
</script>
